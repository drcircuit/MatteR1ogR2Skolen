name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  bygg-og-test:
    name: Bygg og test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer avhengigheter
        run: npm ci

      - name: Typesjekk
        run: npm run typecheck

      - name: Kjør tester
        run: npm run test

      - name: Bygg applikasjon
        run: npm run build

      - name: Last opp build-artefakter
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dist
          path: dist/
          retention-days: 7
